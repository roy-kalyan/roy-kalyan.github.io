<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 600" width="2400" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03060a"/>
      <stop offset="45%" stop-color="#050b14"/>
      <stop offset="100%" stop-color="#01100c"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff8c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff8c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00c3ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00c3ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8fff2"/>
      <stop offset="35%" stop-color="#5dffb0"/>
      <stop offset="100%" stop-color="#00ff8c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8fbff"/>
      <stop offset="35%" stop-color="#6fd9ff"/>
      <stop offset="100%" stop-color="#00c3ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurBig" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .grid { stroke: #1c2c3a; stroke-width: 1; opacity: 0.35; }
      .grid2 { stroke: #16331f; stroke-width: 1; opacity: 0.25; }
      .edge-g { stroke: #00ff8c; stroke-width: 1; opacity: 0.3; }
      .edge-b { stroke: #00c3ff; stroke-width: 1; opacity: 0.3; }
      .code-g { fill: #1fae6e; font-family: 'Courier New', monospace; font-size: 15px; opacity: 0.35; }
      .code-g-bright { fill: #6dffc1; font-family: 'Courier New', monospace; font-size: 15px; opacity: 0.6; }
      .code-b { fill: #1c8fc7; font-family: 'Courier New', monospace; font-size: 15px; opacity: 0.3; }
      .code-b-bright { fill: #7fe2ff; font-family: 'Courier New', monospace; font-size: 15px; opacity: 0.55; }
      .term { fill: #6dffc1; font-family: 'Courier New', monospace; font-size: 16px; opacity: 0.45; }
    </style>
  </defs>

  <!-- Base -->
  <rect width="2400" height="600" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="420"  cy="140" r="320" fill="url(#greenGlow)" filter="url(#blurBig)" opacity="0.32"/>
  <circle cx="1980" cy="470" r="360" fill="url(#blueGlow)"  filter="url(#blurBig)" opacity="0.32"/>
  <circle cx="1850" cy="120" r="260" fill="url(#greenGlow)" filter="url(#blurBig)" opacity="0.16"/>
  <circle cx="450"  cy="500" r="280" fill="url(#blueGlow)"  filter="url(#blurBig)" opacity="0.16"/>
  <circle cx="1200" cy="300" r="300" fill="url(#blueGlow)"  filter="url(#blurBig)" opacity="0.10"/>

  <!-- Geometric grid layers -->
  <g class="grid">
    <line x1="100"  y1="0" x2="100"  y2="600"/>
    <line x1="280"  y1="0" x2="280"  y2="600"/>
    <line x1="460"  y1="0" x2="460"  y2="600"/>
    <line x1="640"  y1="0" x2="640"  y2="600"/>
    <line x1="820"  y1="0" x2="820"  y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
    <line x1="1180" y1="0" x2="1180" y2="600"/>
    <line x1="1360" y1="0" x2="1360" y2="600"/>
    <line x1="1540" y1="0" x2="1540" y2="600"/>
    <line x1="1720" y1="0" x2="1720" y2="600"/>
    <line x1="1900" y1="0" x2="1900" y2="600"/>
    <line x1="2080" y1="0" x2="2080" y2="600"/>
    <line x1="2260" y1="0" x2="2260" y2="600"/>

    <line x1="0" y1="100" x2="2400" y2="100"/>
    <line x1="0" y1="200" x2="2400" y2="200"/>
    <line x1="0" y1="300" x2="2400" y2="300"/>
    <line x1="0" y1="400" x2="2400" y2="400"/>
    <line x1="0" y1="500" x2="2400" y2="500"/>
  </g>

  <!-- Diagonal accent panels -->
  <g class="grid2">
    <line x1="0"    y1="600" x2="500"  y2="0"/>
    <line x1="700"  y1="600" x2="1300" y2="0"/>
    <line x1="1400" y1="600" x2="2000" y2="0"/>
    <line x1="1900" y1="600" x2="2400" y2="100"/>
  </g>

  <!-- Cascading code streams -->
  <g>
    <text x="40" y="35"   class="code-g">if (auth.bypass(token)) {</text>
    <text x="40" y="60"   class="code-g-bright">  exec("/sys/root_shell")</text>
    <text x="40" y="85"   class="code-g">  inject(payload[0x4F2])</text>
    <text x="40" y="110"  class="code-g">}</text>
    <text x="40" y="145"  class="code-g">10110010 01101101 11001010</text>
    <text x="40" y="170"  class="code-g-bright">decrypt(stream, key=0x9A3F)</text>
    <text x="40" y="195"  class="code-g">while (port &lt; 65535) scan(port++)</text>
    <text x="40" y="220"  class="code-g">01001110 10011101 00111100</text>
    <text x="40" y="245"  class="code-g-bright">&gt; connection established</text>
    <text x="40" y="270"  class="code-g">&gt; access granted</text>

    <text x="40" y="380"  class="code-g">for node in graph.nodes:</text>
    <text x="40" y="405"  class="code-g-bright">  weight = sigmoid(dot(w, x))</text>
    <text x="40" y="430"  class="code-g">  propagate(weight, layer+1)</text>
    <text x="40" y="465"  class="code-g">11010011 00101100 10110001</text>
    <text x="40" y="490"  class="code-g">checksum: 7F3A9E2C</text>
    <text x="40" y="520"  class="code-g-bright">root@core:~$ ./run_model --gpu</text>
    <text x="40" y="545"  class="code-g">epoch 042 | loss 0.0183</text>
    <text x="40" y="575"  class="code-g">00110101 11100010 01011010</text>

    <text x="2010" y="35"  class="code-b">SELECT * FROM logs WHERE flag=1;</text>
    <text x="2010" y="60"  class="code-b-bright">handshake(SYN, ACK) -&gt; 0x16</text>
    <text x="2010" y="85"  class="code-b">01100110 11010100 00101011</text>
    <text x="2010" y="120" class="code-b">tunnel.open(remote_host)</text>
    <text x="2010" y="145" class="code-b-bright">[OK] secure channel established</text>
    <text x="2010" y="180" class="code-b">10011001 01110010 00110110</text>
    <text x="2010" y="215" class="code-b">trace route -&gt; 192.168.x.x</text>

    <text x="2010" y="380" class="code-b">array[i][j] = matmul(A, B)</text>
    <text x="2010" y="410" class="code-b-bright">buffer overflow at 0x00FF</text>
    <text x="2010" y="440" class="code-b">11001100 00111101 10101010</text>
    <text x="2010" y="470" class="code-b">spawn(thread_pool, n=16)</text>
    <text x="2010" y="500" class="code-b-bright">root access :: level 5</text>
    <text x="2010" y="530" class="code-b">01010111 10001101 00110011</text>
    <text x="2010" y="560" class="code-b-bright">&lt;/system&gt; compiled OK</text>
  </g>

  <!-- Glowing data arrays (small grid blocks) -->
  <g filter="url(#glow)">
    <g fill="#00ff8c" opacity="0.55">
      <rect x="660" y="60" width="10" height="10"/>
      <rect x="680" y="60" width="10" height="10"/>
      <rect x="700" y="60" width="10" height="10" opacity="0.2"/>
      <rect x="660" y="80" width="10" height="10" opacity="0.2"/>
      <rect x="680" y="80" width="10" height="10"/>
      <rect x="700" y="80" width="10" height="10"/>
      <rect x="660" y="100" width="10" height="10"/>
      <rect x="680" y="100" width="10" height="10" opacity="0.2"/>
      <rect x="700" y="100" width="10" height="10"/>
    </g>
    <g fill="#00c3ff" opacity="0.55">
      <rect x="1700" y="500" width="10" height="10"/>
      <rect x="1720" y="500" width="10" height="10" opacity="0.2"/>
      <rect x="1740" y="500" width="10" height="10"/>
      <rect x="1700" y="520" width="10" height="10" opacity="0.2"/>
      <rect x="1720" y="520" width="10" height="10"/>
      <rect x="1740" y="520" width="10" height="10" opacity="0.2"/>
      <rect x="1700" y="540" width="10" height="10"/>
      <rect x="1720" y="540" width="10" height="10"/>
      <rect x="1740" y="540" width="10" height="10" opacity="0.2"/>
    </g>
  </g>

  <!-- Abstract neural network -->
  <g>
    <!-- green side edges -->
    <g class="edge-g">
      <line x1="440"  y1="220" x2="610" y2="160"/>
      <line x1="440"  y1="220" x2="580" y2="340"/>
      <line x1="440"  y1="220" x2="480"  y2="420"/>
      <line x1="610" y1="160" x2="760" y2="230"/>
      <line x1="610" y1="160" x2="580" y2="340"/>
      <line x1="480"  y1="420" x2="580" y2="340"/>
      <line x1="580" y1="340" x2="760" y2="230"/>
      <line x1="580" y1="340" x2="720" y2="450"/>
      <line x1="480"  y1="420" x2="720" y2="450"/>
    </g>
    <!-- blue side edges -->
    <g class="edge-b">
      <line x1="760" y1="230" x2="930" y2="170"/>
      <line x1="760" y1="230" x2="910" y2="320"/>
      <line x1="720" y1="450" x2="910" y2="320"/>
      <line x1="720" y1="450" x2="880" y2="510"/>
      <line x1="910" y1="320" x2="930" y2="170"/>
      <line x1="910" y1="320" x2="1060" y2="280"/>
      <line x1="930" y1="170" x2="1060" y2="280"/>
      <line x1="880" y1="510" x2="1060" y2="280"/>
      <line x1="1060" y1="280" x2="1200" y2="230"/>
      <line x1="1060" y1="280" x2="1160" y2="400"/>
    </g>

    <!-- green nodes -->
    <g filter="url(#glow)">
      <circle cx="440"  cy="220" r="22" fill="url(#nodeGreen)"/>
      <circle cx="610" cy="160" r="15" fill="url(#nodeGreen)"/>
      <circle cx="580" cy="340" r="24" fill="url(#nodeGreen)"/>
      <circle cx="480"  cy="420" r="15" fill="url(#nodeGreen)"/>
      <circle cx="760" cy="230" r="17" fill="url(#nodeGreen)"/>
      <circle cx="720" cy="450" r="19" fill="url(#nodeGreen)"/>
    </g>
    <!-- blue nodes -->
    <g filter="url(#glow)">
      <circle cx="930" cy="170" r="17" fill="url(#nodeBlue)"/>
      <circle cx="910" cy="320" r="24" fill="url(#nodeBlue)"/>
      <circle cx="880" cy="510" r="15" fill="url(#nodeBlue)"/>
      <circle cx="1060" cy="280" r="22" fill="url(#nodeBlue)"/>
      <circle cx="1200" cy="230" r="15" fill="url(#nodeBlue)"/>
      <circle cx="1160" cy="400" r="17" fill="url(#nodeBlue)"/>
    </g>

    <!-- core dots -->
    <g fill="#ffffff">
      <circle cx="440"  cy="220" r="2.5"/>
      <circle cx="610" cy="160" r="2"/>
      <circle cx="580" cy="340" r="2.5"/>
      <circle cx="480"  cy="420" r="2"/>
      <circle cx="760" cy="230" r="2"/>
      <circle cx="720" cy="450" r="2.5"/>
      <circle cx="930" cy="170" r="2"/>
      <circle cx="910" cy="320" r="2.5"/>
      <circle cx="880" cy="510" r="2"/>
      <circle cx="1060" cy="280" r="2.5"/>
      <circle cx="1200" cy="230" r="2"/>
      <circle cx="1160" cy="400" r="2"/>
    </g>
  </g>

  <!-- Terminal-style accent symbols scattered -->
  <g class="term">
    <text x="320"  y="540">&gt;_ root@kernel:~# █</text>
    <text x="1850" y="100">{ } [ ] &lt; / &gt; ;</text>
    <text x="1180" y="100">0xFF 0x1A 0x9C</text>
    <text x="280"  y="290">&amp;&amp; || == != ++</text>
  </g>

  <!-- Extra fill: secondary node cluster, right-center empty space -->
  <g>
    <g class="edge-b">
      <line x1="1430" y1="280" x2="1580" y2="240"/>
      <line x1="1430" y1="280" x2="1560" y2="380"/>
      <line x1="1580" y1="240" x2="1740" y2="300"/>
      <line x1="1560" y1="380" x2="1740" y2="300"/>
      <line x1="1740" y1="300" x2="1880" y2="250"/>
    </g>
    <g filter="url(#glow)">
      <circle cx="1430" cy="280" r="13" fill="url(#nodeBlue)"/>
      <circle cx="1580" cy="240" r="11" fill="url(#nodeBlue)"/>
      <circle cx="1560" cy="380" r="15" fill="url(#nodeBlue)"/>
      <circle cx="1740" cy="300" r="12" fill="url(#nodeBlue)"/>
      <circle cx="1880" cy="250" r="10" fill="url(#nodeBlue)"/>
    </g>
    <g fill="#ffffff">
      <circle cx="1430" cy="280" r="2"/>
      <circle cx="1580" cy="240" r="1.5"/>
      <circle cx="1560" cy="380" r="2"/>
      <circle cx="1740" cy="300" r="1.5"/>
      <circle cx="1880" cy="250" r="1.5"/>
    </g>
  </g>

  <!-- Extra fill: scattered code/hex in remaining gaps -->
  <g>
    <text x="940"  y="80"  class="code-g">node.weight += grad * lr</text>
    <text x="1020" y="115" class="code-g-bright">layer[3].activate(relu)</text>
    <text x="1450" y="500" class="code-b">10101100 11000110 01011010</text>
    <text x="1450" y="535" class="code-b-bright">cipher: AES-256-GCM</text>
  </g>
</svg>
